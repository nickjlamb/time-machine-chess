<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Time-Machine Chess — play the theory of a past era</title>
<style>
  :root {
    --ink: #33281e; --muted: #7d7264; --bg: #f7f1e6; --card: #fffdf9; --line: #e6dcc9;
    --accent: #9a2c12; --accent-soft: #fbeee6;
    --light: #f0d9b5; --dark: #b58863;
    --sel: #9bc70088; --last: #f3d478aa; --chk: #d43a3a99;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--sans); background: var(--bg); color: var(--ink); }
  .page { max-width: 1700px; margin: 0 auto; padding: 18px clamp(32px, 5vw, 90px) 40px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px;
          box-shadow: 0 1px 3px #33281e0d; }

  /* ---------- header ---------- */
  header { display: flex; align-items: center; gap: 16px; padding: 6px 4px 18px; flex-wrap: wrap; }
  header .home { display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit; }
  header .home:hover .logo { background: var(--accent-soft); }
  .logo { width: 46px; height: 46px; border: 1.5px solid var(--accent); border-radius: 50%;
          display: flex; align-items: center; justify-content: center; color: var(--accent);
          font-size: 1.5rem; background: var(--card); }
  .title h1 { font-family: var(--serif); font-size: 1.9rem; margin: 0; }
  .title .tag { font-family: var(--serif); font-style: italic; color: var(--muted); font-size: .95rem; }
  .title .tag a { color: var(--accent); }
  nav { margin-left: auto; display: flex; gap: 26px; }
  nav a { text-decoration: none; color: var(--ink); font-size: .82rem; text-align: center; cursor: pointer; }
  nav a .ico { display: block; font-size: 1.25rem; margin-bottom: 2px; color: var(--accent); }
  nav a:hover { color: var(--accent); }

  /* ---------- layout ---------- */
  .main { display: grid; grid-template-columns: fit-content(calc(100vh - 130px)) minmax(340px, 560px); gap: 20px; align-items: start; }
  @media (max-width: 840px) {
    .page { padding: 10px 10px 24px; }
    header { gap: 10px; padding-bottom: 10px; }
    .title h1 { font-size: 1.35rem; }
    .title .tag { font-size: .82rem; }
    .logo { width: 38px; height: 38px; font-size: 1.2rem; }
    .main { grid-template-columns: 1fr; gap: 12px; }
    .board-card { width: 100% !important; padding: 8px; }
    .board-frame { grid-template-columns: 12px 1fr; gap: 3px; }
    .era-card { grid-template-columns: 1fr; }
    .era-card .portrait { order: -1; height: 120px; }
    .era-card .portrait img { object-position: center 22%; }
    .era-card .body { padding: 14px 16px; }
    .scoresheet { max-height: 160px; }
  }

  /* ---------- board card ---------- */
  .board-card { padding: 18px; width: calc(100vh - 130px); max-width: 100%; }
  .board-frame { display: grid; grid-template-columns: 16px 1fr; gap: 6px; }
  .ranks { display: grid; grid-template-rows: repeat(8, 1fr); font-size: .72rem; color: var(--muted); align-items: center; text-align: center; }
  .files { display: grid; grid-template-columns: repeat(8, 1fr); font-size: .72rem; color: var(--muted); text-align: center; margin: 6px 0 0 22px; }
  #board { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
           aspect-ratio: 1; border-radius: 10px; overflow: hidden; user-select: none;
           border: 10px solid #6d4b33; box-shadow: inset 0 0 0 1px #00000033, 0 3px 12px #33281e2e; }
  .sq { display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative;
        touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .sq img { width: 86%; height: 86%; pointer-events: none; display: block; }
  .captured img { height: 22px; width: 22px; vertical-align: middle; opacity: .75; }
  .sq.light { background: var(--light); } .sq.dark { background: var(--dark); }
  .sq.last { box-shadow: inset 0 0 0 100px var(--last); }
  .sq.chk  { box-shadow: inset 0 0 0 100px var(--chk); }
  .sq.sel  { outline: 3px solid var(--accent); outline-offset: -3px; }
  .sq.tgt::after { content: ""; position: absolute; width: 28%; height: 28%; border-radius: 50%; background: var(--sel); }
  .sq.tgt.cap::after { width: 86%; height: 86%; background: none; border: 4px solid var(--sel); }
  .captured { min-height: 1.3em; font-size: 1.05rem; letter-spacing: 2px; color: var(--muted); margin-left: 22px; }

  /* ---------- sidebar cards ---------- */
  .side { display: flex; flex-direction: column; gap: 16px; }
  .era-card { display: grid; grid-template-columns: 1fr minmax(150px, 200px); overflow: hidden; }
  .era-card .body { padding: 18px 4px 18px 20px; }
  .era-card h2 { font-family: var(--serif); color: var(--accent); margin: 0; font-size: 1.35rem; }
  .era-card .years { font-family: var(--serif); font-weight: bold; font-size: .9rem; margin-bottom: 8px; }
  .era-card .blurb { font-size: .88rem; color: var(--muted); line-height: 1.45; }
  .era-card .details-btn { display: inline-block; margin-top: 10px; font-size: .82rem; color: var(--accent);
                           border: 1px solid var(--accent); border-radius: 999px; padding: 6px 14px; cursor: pointer; background: none; }
  .era-card .portrait { position: relative; background: var(--accent-soft); }
  .era-card .portrait img { width: 100%; height: 100%; object-fit: cover; object-position: center 18%;
                            filter: sepia(.35) contrast(.95); display: block; }
  .era-card .portrait .fallback { position: absolute; inset: 0; display: flex; align-items: center;
                                  justify-content: center; font-size: 3.4rem; color: var(--accent); opacity: .35; }
  .era-details { display: none; padding: 0 20px 16px; font-size: .85rem; color: var(--muted); line-height: 1.5; grid-column: 1 / -1; }

  .panel-card { padding: 16px 20px; }
  .panel-card h3 { font-family: var(--serif); margin: 0 0 10px; font-size: 1.05rem;
                   display: flex; justify-content: space-between; align-items: center; }
  .hist-nav button { border: 1px solid var(--line); background: none; color: var(--accent);
                     border-radius: 8px; font-size: 1.1rem; line-height: 1; padding: 2px 12px;
                     cursor: pointer; margin-left: 6px; }
  .hist-nav button:disabled { opacity: .35; cursor: default; }
  .hist-nav button:not(:disabled):hover { background: var(--accent-soft); }
  #status { font-family: var(--serif); font-style: italic; min-height: 1.4em; margin-bottom: 8px; }
  #status.thinking::after { content: "…"; animation: dots 1.2s steps(4, end) infinite; }
  @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "…"; } }
  .banner { display: none; background: var(--accent-soft); border: 1px solid var(--accent);
            border-radius: 10px; padding: 9px 13px; margin-bottom: 8px; font-weight: 600; font-size: .9rem; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  button { font-family: var(--sans); font-size: .86rem; border-radius: 10px; padding: 9px 16px; cursor: pointer; }
  button.primary { background: var(--accent); color: #fff; border: none; }
  button.ghost { background: none; color: var(--ink); border: 1px solid var(--line); }
  button.ghost:hover { border-color: var(--accent); color: var(--accent); }

  .scoresheet { max-height: 300px; overflow-y: auto; font-size: .9rem; }
  .scoresheet table { width: 100%; border-collapse: collapse; }
  .scoresheet td { padding: 5px 8px; }
  .scoresheet tr:nth-child(odd) td { background: #f6efe2; }
  .scoresheet td.n { color: var(--muted); width: 2.4em; text-align: right; border-radius: 8px 0 0 8px; }
  .scoresheet td:last-child { border-radius: 0 8px 8px 0; }
  .empty-hint { color: var(--muted); font-size: .85rem; font-style: italic; }
  .scoresheet td.cur { background: var(--accent-soft); outline: 1px solid var(--accent); border-radius: 6px; }

  /* ---------- theory snapshot ---------- */
  .era-nav { display: flex; align-items: center; gap: 6px; }
  .era-nav h2 { flex: 1; }
  .era-nav button { border: none; background: none; color: var(--accent); cursor: pointer;
                    font-size: 1.05rem; padding: 2px 7px; border-radius: 6px; }
  .era-nav button:hover { background: var(--accent-soft); }
  .maxim { font-family: var(--serif); font-style: italic; font-size: .86rem; margin: 10px 0 8px; line-height: 1.4; }
  .meter-row { display: grid; grid-template-columns: 96px 1fr; gap: 10px; align-items: center;
               font-size: .76rem; color: var(--muted); margin: 4px 0; }
  .meter { display: flex; gap: 3px; }
  .meter i { height: 7px; flex: 1; border-radius: 3px; background: #ece1cb; }
  .meter i.on { background: var(--accent); }
  .label-sm { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 8px; }
  .chip { font-size: .75rem; border: 1px solid var(--line); background: var(--accent-soft);
          border-radius: 999px; padding: 3px 10px; }
  .players { font-size: .78rem; color: var(--muted); }

  /* ---------- era picker ---------- */
  .eras { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .pick-card { overflow: hidden; cursor: pointer; transition: transform .12s, box-shadow .12s; }
  .pick-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px #33281e1a; }
  .pick-card .portrait { height: 150px; background: var(--accent-soft); position: relative; }
  .pick-card .portrait img { width: 100%; height: 100%; object-fit: cover; object-position: center 22%; filter: sepia(.35) contrast(.95); display: block; }
  .pick-card .portrait .fallback { position: absolute; inset: 0; display: flex; align-items: center;
                                   justify-content: center; font-size: 4rem; color: var(--accent); opacity: .3; }
  .pick-card .body { padding: 14px 18px 16px; }
  .pick-card h2 { font-family: var(--serif); color: var(--accent); margin: 0; font-size: 1.2rem; }
  .pick-card .years { font-family: var(--serif); font-weight: bold; font-size: .85rem; margin-bottom: 6px; }
  .pick-card p { font-size: .85rem; color: var(--muted); line-height: 1.45; margin: 0 0 8px; }
  .pick-card .cta { font-size: .82rem; color: var(--accent); }

</style>
</head>
<body>
<div class="page">
  <header>
    <a class="home" href="/">
      <div class="logo">&#9200;</div>
      <div class="title">
        <h1>Time-Machine Chess</h1>
        <div class="tag">Play the theory of a past era. Choose your century.</div>
      </div>
    </a>
    <nav>
      <a href="/validation"><span class="ico">&#128214;</span>How it works</a>
    </nav>
  </header>

  <div class="eras" id="eraPicker"></div>

  <div class="main" id="game" style="display:none">
    <div class="card board-card">
      <div class="captured" id="capturedByBot"></div>
      <div class="board-frame"><div class="ranks" id="ranks"></div><div id="board"></div></div>
      <div class="files" id="files"></div>
      <div class="captured" id="capturedByYou"></div>
    </div>

    <div class="side">
      <div class="card era-card">
        <div class="body">
          <div class="era-nav">
            <button id="prevEra" onclick="cycleEra(-1)" title="Previous era">&#9664;</button>
            <h2 id="eraName"></h2>
            <button id="nextEra" onclick="cycleEra(1)" title="Next era">&#9654;</button>
          </div>
          <div class="years" id="eraYears"></div>
          <div class="blurb" id="eraBlurb"></div>
          <div id="snapshot"></div>
        </div>
        <div class="portrait"><span class="fallback" id="portraitFallback"></span><img id="portraitImg" alt="" onerror="this.style.display='none'"></div>
      </div>

      <div class="card panel-card">
        <div id="colorChoice">
          <h3>Take your seat</h3>
          <div class="btn-row">
            <button class="primary" onclick="beginGame('w')">&#9812; Play White</button>
            <button class="primary" onclick="beginGame('b')">&#9818; Play Black</button>
          </div>
        </div>
        <div id="gameControls" style="display:none">
          <div id="status"></div>
          <div class="banner" id="banner"></div>
          <div class="btn-row">
            <button class="primary" onclick="beginGame(playerColor)">&#8635; New game</button>
            <button class="ghost" onclick="resign()">&#9873; Resign</button>
            <button class="ghost" onclick="showPicker()">Choose era</button>
            <button class="ghost" id="soundBtn" onclick="toggleSound()" title="Toggle sound">&#128266;</button>
          </div>
        </div>
      </div>

      <div class="card panel-card">
        <h3>Game history
          <span class="hist-nav">
            <button id="backBtn" onclick="viewPos(-1)" title="Previous position (←)">&#8249;</button>
            <button id="fwdBtn" onclick="viewPos(1)" title="Next position (→)">&#8250;</button>
          </span>
        </h3>
        <div class="scoresheet"><table id="moveTable"></table></div>
        <div class="empty-hint" id="movesEmpty">No moves yet.</div>
      </div>
    </div>
  </div>

</div>

<script>
const GLYPHS = { K:'♔', Q:'♕', R:'♖', B:'♗', N:'♘', P:'♙', k:'♚', q:'♛', r:'♜', b:'♝', n:'♞', p:'♟' };
const FILES = 'abcdefgh';
const START_FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
const ERA_UI = {
  romantic:  { palette: { light:'#f0d9b5', dark:'#b58863' }, glyph: '♞', pieceSet: 'merida',
               blurb: 'A time of attacking flair, gambits and brilliant sacrifice.',
               maxim: '“Attack before defence. Material is gladly given for initiative — declining a gambit was borderline dishonorable.”',
               meters: { 'Aggression': 5, 'Sacrifices': 5, 'Positional play': 2, 'Patience': 1 },
               openings: ["King's Gambit", 'Evans Gambit', 'Giuoco Piano'],
               players: ['Anderssen', 'Morphy', 'Chigorin'] },
  classical: { palette: { light:'#eeeed2', dark:'#769656' }, glyph: '♝',
               blurb: 'Clarity, technique and the hypermodern rebellion.',
               maxim: '“Control the centre, develop soundly, accumulate small advantages — then convert with clean technique.”',
               meters: { 'Aggression': 3, 'Sacrifices': 2, 'Positional play': 5, 'Patience': 4 },
               openings: ["Queen's Gambit Declined", 'Ruy Lopez', 'Nimzo-Indian'],
               players: ['Capablanca', 'Lasker', 'Nimzowitsch'] },
  soviet:    { palette: { light:'#dee3e6', dark:'#8ca2ad' }, glyph: '♜', pieceSet: 'alpha',
               blurb: 'Deep preparation, prophylaxis and iron technique.',
               maxim: '“Prepare deeper than your opponent, prevent their plans before your own, and give nothing away.”',
               meters: { 'Aggression': 3, 'Sacrifices': 3, 'Positional play': 5, 'Patience': 5 },
               openings: ["King's Indian", 'Sicilian Najdorf', 'English Opening'],
               players: ['Botvinnik', 'Tal', 'Petrosian', 'Karpov'] },
};
const ERA_ORDER = ['romantic', 'classical', 'soviet'];

function cycleEra(dir) {
  const next = ERA_ORDER[(ERA_ORDER.indexOf(era) + dir + ERA_ORDER.length) % ERA_ORDER.length];
  selectEra(next, ERAS[next]);
}

function renderSnapshot(ui) {
  const meter = n => '<span class="meter">' +
    Array.from({ length: 5 }, (_, i) => `<i class="${i < n ? 'on' : ''}"></i>`).join('') + '</span>';
  document.getElementById('snapshot').innerHTML =
    `<div class="maxim">${ui.maxim}</div>` +
    Object.entries(ui.meters).map(([k, v]) =>
      `<div class="meter-row"><span>${k}</span>${meter(v)}</div>`).join('') +
    `<div class="label-sm">Typical openings</div>
     <div class="chips">${ui.openings.map(o => `<span class="chip">${o}</span>`).join('')}</div>
     <div class="players"><b>Great players:</b> ${ui.players.join(' · ')}</div>`;
}

function setTurnStatus(check = false) {
  const parts = fen.split(' ');
  const side = parts[1] === 'w' ? 'White' : 'Black';
  setStatus(`Move ${parts[5]} &middot; ${side} to play${check ? ' — <b>check!</b>' : ''}`);
}
let ERAS = {}, era, eraMeta, fen, legalMoves = [], selected = null, busy = false,
    playerColor = 'w', ply = 0, lastMove = null, finished = false,
    positions = [], viewIndex = 0;

/* ---------- position history / review ---------- */
function pushPosition(f, mv) {
  positions.push({ fen: f, move: mv });
  viewIndex = positions.length - 1;
  updateNavButtons();
}

function updateNavButtons() {
  const back = document.getElementById('backBtn'), fwd = document.getElementById('fwdBtn');
  if (!back) return;
  back.disabled = viewIndex <= 0;
  fwd.disabled = viewIndex >= positions.length - 1;
}

function viewPos(delta) {
  const target = viewIndex + delta;
  if (target < 0 || target > positions.length - 1 || positions.length === 0) return;
  viewIndex = target;
  const p = positions[viewIndex];
  fen = p.fen; lastMove = p.move;
  render(); updateCaptured(); updateNavButtons();
  highlightHistoryCell();
  if (viewIndex < positions.length - 1) {
    setStatus(`Reviewing position ${viewIndex} of ${positions.length - 1} &mdash; &rsaquo; to return`);
  } else if (finished) { setStatus(''); }
  else setTurnStatus();
}

function highlightHistoryCell() {
  const cells = [...document.querySelectorAll('#moveTable td:not(.n)')].filter(td => td.textContent);
  cells.forEach(td => td.classList.remove('cur'));
  if (viewIndex > 0 && cells[viewIndex - 1]) cells[viewIndex - 1].classList.add('cur');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { viewPos(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { viewPos(1); e.preventDefault(); }
});

/* ---------- sounds (Web Audio, no files) ---------- */
let audioCtx = null, soundOn = true;

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').innerHTML = soundOn ? '&#128266;' : '&#128263;';
}

function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function thock(freq, duration, volume, delay = 0) {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime + delay;
  const osc = ac.createOscillator(), gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.55, t + duration);
  gain.gain.setValueAtTime(volume, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain).connect(ac.destination);
  osc.start(t); osc.stop(t + duration + 0.02);
  // touch of "wood": a filtered noise tick layered on top
  const buf = ac.createBuffer(1, ac.sampleRate * 0.02, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const noise = ac.createBufferSource(), ngain = ac.createGain(), filt = ac.createBiquadFilter();
  noise.buffer = buf; filt.type = 'lowpass'; filt.frequency.value = 2200;
  ngain.gain.setValueAtTime(volume * 0.5, t);
  ngain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
  noise.connect(filt).connect(ngain).connect(ac.destination);
  noise.start(t);
}

function playSan(san, delay = 0) {
  if (san.includes('#')) { thock(180, .12, .5, delay); thock(120, .3, .45, delay + .15); return; }
  if (san.startsWith('O-O')) { thock(200, .07, .35, delay); thock(200, .07, .35, delay + .09); return; }
  if (san.includes('x') && san.includes('+')) { thock(150, .1, .5, delay); thock(430, .09, .3, delay + .1); return; }
  if (san.includes('x')) { thock(150, .1, .5, delay); return; }
  if (san.includes('+')) { thock(430, .09, .3, delay); return; }
  thock(210, .07, .4, delay);
}

function playGameOver(won) {
  if (won) { thock(330, .12, .35); thock(415, .12, .35, .14); thock(523, .25, .4, .28); }
  else { thock(260, .15, .35); thock(200, .3, .35, .18); }
}

async function loadEras() {
  ERAS = await (await fetch('/api/eras')).json();
  const picker = document.getElementById('eraPicker');
  picker.innerHTML = '';
  for (const [id, e] of Object.entries(ERAS)) {
    const ui = ERA_UI[id] || {};
    const card = document.createElement('div');
    card.className = 'card pick-card';
    card.innerHTML = `
      <div class="portrait"><span class="fallback">${ui.glyph || '♟'}</span>
        <img src="/img/${id}.jpg" alt="" onerror="this.style.display='none'"></div>
      <div class="body"><h2>${e.name}</h2><div class="years">${e.years[0]}&ndash;${e.years[1]}</div>
        <p>${ui.blurb || ''}</p><div class="cta">Step into ${e.years[0]} &rarr;</div></div>`;
    card.onclick = () => selectEra(id, e);
    picker.appendChild(card);
  }
}

function showPicker() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('eraPicker').style.display = 'grid';
}

function selectEra(id, e) {
  era = id; eraMeta = e;
  const ui = ERA_UI[id] || {};
  if (ui.palette) { document.documentElement.style.setProperty('--light', ui.palette.light);
                    document.documentElement.style.setProperty('--dark', ui.palette.dark); }
  document.getElementById('eraPicker').style.display = 'none';
  document.getElementById('game').style.display = 'grid';
  document.getElementById('eraName').textContent = e.name;
  document.getElementById('eraYears').textContent = `${e.years[0]}–${e.years[1]}`;
  document.getElementById('eraBlurb').textContent = ui.blurb || '';
  renderSnapshot(ui);
  const order = ERA_ORDER, i = order.indexOf(id);
  document.getElementById('prevEra').title = ERAS[order[(i + 2) % 3]].name;
  document.getElementById('nextEra').title = ERAS[order[(i + 1) % 3]].name;
  document.getElementById('portraitFallback').textContent = ui.glyph || '♟';
  const img = document.getElementById('portraitImg');
  img.style.display = 'block'; img.src = `/img/${id}.jpg`;
  document.getElementById('colorChoice').style.display = 'block';
  document.getElementById('gameControls').style.display = 'none';
  document.getElementById('moveTable').innerHTML = '';
  document.getElementById('movesEmpty').style.display = 'block';
  fen = START_FEN; lastMove = null; selected = null;
  buildBoard(); render(); updateCaptured();
}

async function beginGame(color) {
  playerColor = color; fen = START_FEN; ply = 0; lastMove = null; selected = null; finished = false;
  positions = [{ fen: START_FEN, move: null }]; viewIndex = 0; updateNavButtons();
  document.getElementById('colorChoice').style.display = 'none';
  document.getElementById('gameControls').style.display = 'block';
  document.getElementById('banner').style.display = 'none';
  document.getElementById('moveTable').innerHTML = '';
  document.getElementById('movesEmpty').style.display = 'block';
  buildBoard(); render(); updateCaptured();
  if (color === 'b') {
    setStatus('The past opens', true);
    const r = await (await fetch('/api/move', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ era, fen }) })).json();
    await new Promise(done => setTimeout(done, 700 + Math.random() * 800));
    fen = r.fen; lastMove = r.move; logSan(r.san); playSan(r.san); render(false, r.move);
    pushPosition(r.fen, r.move);
  }
  setTurnStatus();
  await refreshLegal();
}

function buildBoard() {
  const board = document.getElementById('board');
  const ranksEl = document.getElementById('ranks');
  const filesEl = document.getElementById('files');
  board.innerHTML = ranksEl.innerHTML = filesEl.innerHTML = '';
  const ranks = playerColor === 'w' ? [8,7,6,5,4,3,2,1] : [1,2,3,4,5,6,7,8];
  const files = playerColor === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
  for (const r of ranks) {
    ranksEl.innerHTML += `<div>${r}</div>`;
    for (const f of files) {
      const name = FILES[f] + r;
      const sq = document.createElement('div');
      sq.id = 'sq_' + name;
      sq.className = 'sq ' + ((f + r) % 2 ? 'light' : 'dark');
      sq.onclick = () => clickSquare(name);
      board.appendChild(sq);
    }
  }
  for (const f of files) filesEl.innerHTML += `<div>${FILES[f]}</div>`;
}

function pieceAt(square, f = fen) {
  const rows = f.split(' ')[0].split('/');
  const rank = 8 - parseInt(square[1]), file = FILES.indexOf(square[0]);
  let col = 0;
  for (const ch of rows[rank]) {
    if (/\d/.test(ch)) { col += +ch; }
    else { if (col === file) return ch; col++; }
  }
  return null;
}

function kingSquare(color) {
  const target = color === 'w' ? 'K' : 'k';
  for (let r = 1; r <= 8; r++) for (let f = 0; f < 8; f++) {
    const n = FILES[f] + r;
    if (pieceAt(n) === target) return n;
  }
  return null;
}

function render(inCheck = false, animMove = null) {
  for (let r = 1; r <= 8; r++) for (let f = 0; f < 8; f++) {
    const name = FILES[f] + r;
    const el = document.getElementById('sq_' + name);
    if (!el) continue;
    const p = pieceAt(name);
    el.innerHTML = p ? pieceImg(p) : '';
    el.className = el.className.replace(/ (sel|tgt|cap|last|chk)/g, '');
  }
  if (lastMove) for (const s of [lastMove.slice(0,2), lastMove.slice(2,4)]) {
    const el = document.getElementById('sq_' + s);
    if (el) el.classList.add('last');
  }
  if (inCheck) {
    const ks = kingSquare(playerColor);
    if (ks) document.getElementById('sq_' + ks).classList.add('chk');
  }
  if (animMove) {
    const from = document.getElementById('sq_' + animMove.slice(0, 2));
    const to = document.getElementById('sq_' + animMove.slice(2, 4));
    const img = to && to.querySelector('img');
    if (from && to && img) {
      const f = from.getBoundingClientRect(), t = to.getBoundingClientRect();
      img.style.transition = 'none';
      img.style.transform = `translate(${f.left - t.left}px, ${f.top - t.top}px)`;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        img.style.transition = 'transform .28s ease';
        img.style.transform = '';
      }));
    }
  }
}

function pieceSrc(p) {
  const code = `${p === p.toUpperCase() ? 'w' : 'b'}${p.toUpperCase()}`;
  const set = era && ERA_UI[era] && ERA_UI[era].pieceSet;
  return set ? `/pieces/${set}/${code}.svg` : `/api/piece/${code}.svg`;
}

function pieceImg(p) {   // falls back to the cburnett endpoint if a set file is missing
  const code = `${p === p.toUpperCase() ? 'w' : 'b'}${p.toUpperCase()}`;
  return `<img src="${pieceSrc(p)}" alt="${GLYPHS[p]}" onerror="this.onerror=null;this.src='/api/piece/${code}.svg'">`;
}

function updateCaptured() {
  const start = { P:8,N:2,B:2,R:2,Q:1,p:8,n:2,b:2,r:2,q:1 };
  const now = {};
  for (const ch of fen.split(' ')[0]) if (GLYPHS[ch] && ch.toLowerCase() !== 'k') now[ch] = (now[ch] || 0) + 1;
  let whiteLost = '', blackLost = '';
  for (const [pc, n] of Object.entries(start)) {
    const missing = n - (now[pc] || 0);
    if (missing > 0) {
      const g = pieceImg(pc).repeat(missing);
      if (pc === pc.toUpperCase()) whiteLost += g; else blackLost += g;
    }
  }
  document.getElementById('capturedByYou').innerHTML = playerColor === 'w' ? blackLost : whiteLost;
  document.getElementById('capturedByBot').innerHTML = playerColor === 'w' ? whiteLost : blackLost;
}

async function refreshLegal() {
  legalMoves = (await (await fetch('/api/legal?fen=' + encodeURIComponent(fen))).json()).moves;
}

function ownPiece(p) {
  return p && (playerColor === 'w' ? p === p.toUpperCase() : p === p.toLowerCase());
}

function clickSquare(name) {
  if (busy || finished || fen.split(' ')[1] !== playerColor) return;
  if (positions.length && viewIndex !== positions.length - 1) return;  // reviewing the past
  const p = pieceAt(name);
  if (selected && (legalMoves.includes(selected + name) || legalMoves.includes(selected + name + 'q'))) {
    submitMove(legalMoves.includes(selected + name) ? selected + name : selected + name + 'q');
    return;
  }
  render(); selected = null;
  if (ownPiece(p)) {
    selected = name;
    document.getElementById('sq_' + name).classList.add('sel');
    legalMoves.filter(m => m.startsWith(name)).forEach(m => {
      const t = document.getElementById('sq_' + m.slice(2, 4));
      if (!t) return;
      t.classList.add('tgt');
      if (pieceAt(m.slice(2, 4))) t.classList.add('cap');
    });
  }
}

function applyLocalMove(uci) {
  // Optimistic render: the move is known-legal, so show it instantly and let
  // the server response reconcile the FEN afterwards.
  const from = uci.slice(0, 2), to = uci.slice(2, 4);
  const fromEl = document.getElementById('sq_' + from), toEl = document.getElementById('sq_' + to);
  const moving = pieceAt(from);
  const wasCapture = !!pieceAt(to);
  const isPawn = moving && moving.toLowerCase() === 'p';
  let enPassant = false;
  if (isPawn && from[0] !== to[0] && !wasCapture) {          // en passant capture
    enPassant = true;
    const capEl = document.getElementById('sq_' + to[0] + from[1]);
    if (capEl) capEl.innerHTML = '';
  }
  toEl.innerHTML = fromEl.innerHTML;
  fromEl.innerHTML = '';
  if (isPawn && uci.length === 5)                            // promotion (auto-queen)
    toEl.innerHTML = pieceImg(moving === 'P' ? 'Q' : 'q');
  if (moving && moving.toLowerCase() === 'k' && Math.abs(to.charCodeAt(0) - from.charCodeAt(0)) === 2) {
    const rank = from[1], kingside = to[0] === 'g';          // castling: move the rook too
    const rFrom = document.getElementById('sq_' + (kingside ? 'h' : 'a') + rank);
    const rTo = document.getElementById('sq_' + (kingside ? 'f' : 'd') + rank);
    rTo.innerHTML = rFrom.innerHTML; rFrom.innerHTML = '';
    thock(200, .07, .35); thock(200, .07, .35, .09);
  } else if (wasCapture || enPassant) thock(150, .1, .5);
  else thock(210, .07, .4);
  document.querySelectorAll('.sq').forEach(el => el.className = el.className.replace(/ (sel|tgt|cap|last|chk)/g, ''));
  fromEl.classList.add('last'); toEl.classList.add('last');
  const img = toEl.querySelector('img');
  if (img) {
    const f = fromEl.getBoundingClientRect(), t = toEl.getBoundingClientRect();
    img.style.transition = 'none';
    img.style.transform = `translate(${f.left - t.left}px, ${f.top - t.top}px)`;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      img.style.transition = 'transform .28s ease'; img.style.transform = '';
    }));
  }
  selected = null;
}

async function submitMove(uci) {
  busy = true;
  applyLocalMove(uci);                       // instant — no waiting on the network
  setStatus(eraMeta.name + ' is thinking', true);
  const sentAt = performance.now();
  try {
    const res = await fetch('/api/play', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ era, fen, move: uci }) });
    if (!res.ok) { render(); setStatus('Move rejected — try another.'); busy = false; return; }
    const d = await res.json();
    logSan(d.playerSan);
    if (d.playerSan.includes('+') || d.playerSan.includes('#')) thock(430, .09, .3);
    fen = d.fenAfterPlayer || d.fen;
    lastMove = uci;
    pushPosition(fen, uci);
    render(); updateCaptured();              // reconcile with authoritative position
    if (!d.botSan) {           // game ended on the player's move
      fen = d.fen;
      if (d.gameOver) gameOver(d);
      busy = false;
      return;
    }
    // 2. Let the past "think" a little — minus however long the server already took
    const elapsed = performance.now() - sentAt;
    const delay = Math.max(150, 600 + Math.random() * 1200 - elapsed);
    setTimeout(async () => {
      fen = d.fen; lastMove = d.botMove;
      logSan(d.botSan); playSan(d.botSan);
      pushPosition(d.fen, d.botMove);
      render(d.check, d.botMove); updateCaptured();
      if (d.gameOver) gameOver(d);
      else { setTurnStatus(d.check); await refreshLegal(); }
      busy = false;
    }, delay);
    return;                    // busy stays true until the bot "moves"
  } catch {
    render();                  // revert the optimistic move — fen was never updated
    setStatus('Connection lost — is the backend running?');
  }
  busy = false;
}

function logSan(san) {
  document.getElementById('movesEmpty').style.display = 'none';
  const table = document.getElementById('moveTable');
  if (ply % 2 === 0) {
    table.insertAdjacentHTML('beforeend', `<tr><td class="n">${ply / 2 + 1}.</td><td>${san}</td><td></td></tr>`);
  } else {
    const rows = table.querySelectorAll('tr');           // browser wraps rows in an
    rows[rows.length - 1].lastElementChild.textContent = san;  // implicit <tbody>
  }
  table.querySelectorAll('td.cur').forEach(td => td.classList.remove('cur'));
  const rows = table.querySelectorAll('tr'), last = rows[rows.length - 1];
  (ply % 2 === 0 ? last.children[1] : last.lastElementChild).classList.add('cur');
  ply++;
  const sheet = document.querySelector('.scoresheet');
  sheet.scrollTop = sheet.scrollHeight;
}

function resign() {
  if (busy || finished || !fen) return;
  finished = true;
  const result = playerColor === 'w' ? '0-1' : '1-0';
  const banner = document.getElementById('banner');
  banner.textContent = `You resigned — the past claims you. (${result})`;
  banner.style.display = 'block';
  setStatus('');
  playGameOver(false);
}

function gameOver(d) {
  finished = true;
  let msg = 'Drawn — honours shared.';
  const won = (d.result === '1-0' && playerColor === 'w') || (d.result === '0-1' && playerColor === 'b');
  if (d.result !== '1/2-1/2') msg = won ? 'Victory — you beat the past!' : 'The past claims you.';
  setTimeout(() => playGameOver(won && d.result !== '1/2-1/2'), 500);
  const banner = document.getElementById('banner');
  banner.textContent = `${msg} (${d.result})`;
  banner.style.display = 'block';
  setStatus('');
}

function setStatus(html, thinking = false) {
  const el = document.getElementById('status');
  el.innerHTML = html;
  el.classList.toggle('thinking', thinking);
}

loadEras();
</script>
