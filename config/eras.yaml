# Era definitions. date ranges drive the data pipeline; style params drive the
# heuristic placeholder engines; flavor copy is shown on the era picker.
eras:
  romantic:
    name: "The Romantic Era"
    years: [1840, 1885]
    engine: maia2
    flavor: >
      Gambits, sacrifices, and king hunts. Declining a gambit was borderline
      dishonorable. Play like you're facing Adolf Anderssen in a Paris café —
      see the Evergreen Game (Anderssen–Dufresne, 1852).
    style:                     # heuristic engine params (placeholder until training)
      temperature: 0.7
      capture_bonus: 1.2
      check_bonus: 1.6
      sacrifice_tolerance: 0.85  # willingness to lose material for activity
      king_safety_weight: 0.1
      development_weight: 0.7
    draws:                     # draw-agreement willingness (see backend/draws.py)
      band: 0.02               # |white_win_prob - 0.5| <= band counts as dead equal
      streak: 12               # consecutive dead-equal evaluations required
      min_move: 70             # earliest fullmove number to agree — Romantics fight on
    resign:                    # resignation manners (see backend/manners.py)
      threshold: 0.05          # tuned up from 0.04: too-stubborn resignation left
      streak: 4                # long grinds ending as natural draws (17.3% vs 12%
      min_ply: 26              # target, +12 plies). Still the most stubborn era.
  classical:
    name: "The Classical Era"
    years: [1900, 1939]
    engine: maia2
    flavor: >
      Capablanca's clarity meets Nimzowitsch's rebellion. Control the center —
      or control it from a distance. Sound development, prophylaxis, technique.
      See Capablanca–Marshall, 1918.
    style:
      temperature: 0.6
      capture_bonus: 0.3
      check_bonus: 0.3
      sacrifice_tolerance: 0.15
      king_safety_weight: 0.6
      development_weight: 0.9
    draws:                     # loosened from (0.06/5/30): era resignation ended
      band: 0.075              # games before the agreement zone, dropping draws
      streak: 4                # to 19.3% vs the 25% target
      min_move: 30             # moderate — draws respected, not sought
    resign:
      threshold: 0.06
      streak: 3
      min_ply: 24              # sound technique concedes to sound technique
  soviet:
    name: "The Soviet Era"
    years: [1950, 1985]
    engine: maia2
    flavor: >
      Deep preparation, iron technique, and prophylaxis. Nothing is given away;
      wins are ground out. Play like the Botvinnik school is watching.
      See Karpov–Unzicker, 1974.
    style:
      temperature: 0.4
      capture_bonus: 0.2
      check_bonus: 0.2
      sacrifice_tolerance: 0.05
      king_safety_weight: 0.9
      development_weight: 0.8
    draws:                     # tuning history: (0.10/4/18) 64% pre-resignation;
      band: 0.085              # (0.07/5/25) 30% pre- / 20.7% post-resignation;
      streak: 4                # (0.09/4/24) 33.3% but avg plies fell to 62.9 —
      min_move: 28             # agreements came too early. Later zone, same culture.
    resign:                    # softened from (0.09/3/20): over-prompt resignation
      threshold: 0.07          # truncated games (64 plies vs 72.7) and starved the
      streak: 3                # draw zone (23.3% vs 28.75%). Still resigns promptly
      min_ply: 24              # and correctly — just not prematurely.

pipeline:
  min_moves: 10          # drop miniatures/junk
  max_games_per_era: 500000
