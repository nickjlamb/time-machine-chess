# Era definitions. date ranges drive the data pipeline; style params drive the
# heuristic placeholder engines; flavor copy is shown on the era picker;
# verdict copy is the era classifier's one-liner for players it claims.
eras:
  romantic:
    name: "The Romantic Era"
    years: [1840, 1885]
    engine: maia2
    flavor: >
      Gambits, sacrifices, and king hunts. Declining a gambit was borderline
      dishonorable. Play like you're facing Adolf Anderssen in a Paris café —
      see the Evergreen Game (Anderssen–Dufresne, 1852).
    verdict: >
      You belong in a Paris café in 1858 — brilliancies first, safety
      later, and declining a gambit would be borderline dishonorable.
    style:                     # heuristic engine params (placeholder until training)
      temperature: 0.7
      capture_bonus: 1.2
      check_bonus: 1.6
      sacrifice_tolerance: 0.85  # willingness to lose material for activity
      king_safety_weight: 0.1
      development_weight: 0.7
    draws:                     # draw-agreement willingness (see backend/draws.py)
      band: 0.02               # |white_win_prob - 0.5| <= band counts as dead equal
      streak: 12               # consecutive dead-equal evaluations required
      min_move: 70             # earliest fullmove number to agree — Romantics fight on
    resign:                    # resignation manners (see backend/manners.py)
      threshold: 0.05          # tuned up from 0.04: too-stubborn resignation left
      streak: 4                # long grinds ending as natural draws (17.3% vs 12%
      min_ply: 26              # target, +12 plies). Still the most stubborn era.
  classical:
    name: "The Classical Era"
    years: [1900, 1939]
    engine: maia2
    flavor: >
      Capablanca's clarity meets Nimzowitsch's rebellion. Control the center —
      or control it from a distance. Sound development, prophylaxis, technique.
      See Capablanca–Marshall, 1918.
    verdict: >
      Sound development, honest technique, nothing before its time —
      Capablanca would nod, and Tarrasch would claim the credit.
    style:
      temperature: 0.6
      capture_bonus: 0.3
      check_bonus: 0.3
      sacrifice_tolerance: 0.15
      king_safety_weight: 0.6
      development_weight: 0.9
    draws:                     # loosened from (0.06/5/30): era resignation ended
      band: 0.075              # games before the agreement zone, dropping draws
      streak: 4                # to 19.3% vs the 25% target
      min_move: 30             # moderate — draws respected, not sought
    resign:
      threshold: 0.06
      streak: 3
      min_ply: 24              # sound technique concedes to sound technique
  soviet:
    name: "The Soviet Era"
    years: [1950, 1985]
    engine: maia2
    flavor: >
      Deep preparation, iron technique, and prophylaxis. Nothing is given away;
      wins are ground out. Play like the Botvinnik school is watching.
      See Karpov–Unzicker, 1974.
    verdict: >
      Prepared, prophylactic, patient — the Botvinnik school has been
      watching, and it approves. Nothing is given away.
    style:
      temperature: 0.4
      capture_bonus: 0.2
      check_bonus: 0.2
      sacrifice_tolerance: 0.05
      king_safety_weight: 0.9
      development_weight: 0.8
    draws:                     # tuning history: (0.10/4/18) 64% pre-resignation;
      band: 0.085              # (0.07/5/25) 30% pre- / 20.7% post-resignation;
      streak: 4                # (0.09/4/24) 33.3% but avg plies fell to 62.9 —
      min_move: 28             # agreements came too early. Later zone, same culture.
    resign:                    # softened from (0.09/3/20): over-prompt resignation
      threshold: 0.07          # truncated games (64 plies vs 72.7) and starved the
      streak: 3                # draw zone (23.3% vs 28.75%). Still resigns promptly
      min_ply: 24              # and correctly — just not prematurely.

  digital:
    name: "The Engine Dawn"
    years: [1990, 1999]
    engine: maia2
    flavor: >
      Database preparation meets concrete calculation — and mid-decade, a
      computer beats the world champion. Theory runs past move twenty and
      dynamism is king. See Kasparov–Topalov, 1999.
    verdict: >
      Concrete, dynamic, booked past move twenty — pure 1990s: the
      databases made you sharp and the machines are watching.
    style:                     # heuristic placeholder until the model is trained
      temperature: 0.5
      capture_bonus: 0.4
      check_bonus: 0.4
      sacrifice_tolerance: 0.3
      king_safety_weight: 0.7
      development_weight: 0.85
    draws:                     # targets from corpus baseline: 31.75% draws, 75.2
      band: 0.09               # avg plies — the draw-iest era of the four (peak
      streak: 4                # grandmaster-draw culture, pre-Sofia rules).
      min_move: 26             # Set slightly more willing than soviet's final
    resign:                    # constants, which landed slightly under target.
      threshold: 0.06
      streak: 3
      min_ply: 26

  modern:
    name: "The Engine Era"
    years: [2010, 2019]
    engine: maia2
    flavor: >
      Everyone has a supercomputer in their pocket, and it shows: Berlin
      endgames, engine-approved novelties at move 25, and defences that
      hold forever — until Carlsen grinds them down. See Carlsen–Karjakin,
      2016.
    verdict: >
      Engine-approved and unhurried — you defend the unpleasant positions,
      decline the shortcuts, and grind like it's 2016.
    style:                     # heuristic placeholder until the model is trained
      temperature: 0.45
      capture_bonus: 0.25
      check_bonus: 0.25
      sacrifice_tolerance: 0.15
      king_safety_weight: 0.85
      development_weight: 0.85
    draws:                     # targets: 31.75% / 78.4 plies. Tuning: (0.08/5/30)
      band: 0.08               # gave 23.3%, (0.09/4/28) gave 42.0% — this model's
      streak: 4                # evals hover near equal far more than other eras'
      min_move: 30             # (very Berlin). Intermediate: streak 4, tight band.
    resign:
      threshold: 0.05          # defends stubbornly — resources until the end
      streak: 3
      min_ply: 28

pipeline:
  min_moves: 10          # drop miniatures/junk
  max_games_per_era: 500000
